<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Labour Report | Dashboard</title>
    <!-- Importing Inter font for a modern look -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Navbar Styling */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
        }

        .nav-links li {
            margin-left: 28px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Layout Container */
        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
        }

        /* Card Container (shared by Form and Table) */
        .card {
            background: var(--white);
            padding: 28px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111827;
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #f9fafb;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        /* Table Styling */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f9fafb;
        }

        /* Badge for Quantity */
        .qty-badge {
            background: #eff6ff;
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .navbar {
                padding: 0 5%;
            }
        }

        @media (max-width: 600px) {
            .nav-links {
                display: none; /* Consider a hamburger menu for production */
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">CompanyLogo</div>
    <nav>
        <ul class="nav-links">
            <li><a th:href="@{/timesheets}">Timesheet</a></li>
            <li><a th:href="@{/profile}">My Profile</a></li>
            <li><a th:href="@{/employees}">Employee List</a></li>
            <li><a th:href="@{/labourRecords}">Labour Entries</a></li>
            <li><a th:href="@{/logout}" style="color: #dc2626;">Logout</a></li>
        </ul>
    </nav>
</header>

<div class="main-content">
    <!-- Left Side: Form Section -->
    <section class="card">
        <h2>Daily Entry</h2>
        <form th:action="@{/labourRecords/saveLabour}" th:object="${labour}" method="post">
            <div class="input-group">
                <label>Date</label>
                <input type="date" th:field="*{date}" required />
            </div>
            
            <div class="input-group">
                <label>Project Name</label>
                <select th:field="*{project_name}" required>
                    <option value="" disabled selected>Select Project</option>
                    <option value="Well">Well</option>
                    <option value="47 Smart City">47 Smart City</option>
                    <option value="84-Konark">84-Konark</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Site Name</label>
                <input type="text" th:field="*{site_name}" placeholder="e.g. Block A" required>
            </div>
            
            <div class="input-group">
                <label>Labour Quantity</label>
                <input type="number" th:field="*{labour_qty}" min="1" placeholder="0" required>
            </div>
            
            <button type="submit">Submit Entry</button>
        </form>
    </section>

    <!-- Right Side: History Section -->
    <section class="card">
        <h2>History</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Employee</th>
                        <th>Project</th>
                        <th>Site</th>
                        <th>Qty</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Thymeleaf iteration -->
                    <tr th:each="item : ${allLabours}">
                        <td th:text="${item.date}">2023-10-01</td>
                        <td style="font-weight: 600;" th:text="${item.user != null ? item.user.firstName : 'Unknown'}">John Doe</td>
                        <td th:text="${item.project_name}">Project Name</td>
                        <td th:text="${item.site_name}">Site A</td>
                        <td>
                            <span class="qty-badge" th:text="${item.labour_qty}">0</span>
                        </td>
                    </tr>
                    <!-- Empty State -->
                    <tr th:if="${#lists.isEmpty(allLabours)}">
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">
                            No records available yet.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

</body>
</html>
