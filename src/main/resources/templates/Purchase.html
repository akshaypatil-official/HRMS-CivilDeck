<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchase Management</title>
<style>
:root {
	--primary: #4361ee;
	--secondary: #3f37c9;
	--bg: #f8f9fa;
	--white: #ffffff;
	--text: #2b2d42;
	--border: #e0e0e0;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Inter', sans-serif;
}

body {
	background-color: var(--bg);
	color: var(--text-main);
	line-height: 1.5;
}

.navbar {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 0 6%;
	height: 70px;
	background: rgba(255, 255, 255, 0.9);
	backdrop-filter: blur(10px);
	position: sticky;
	top: 0;
	z-index: 1000;
	border-bottom: 1px solid rgba(0, 0, 0, 0.05);
	box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
}

.logo {
	font-size: 1.4rem;
	font-weight: 800;
	color: var(--primary);
	letter-spacing: -0.5px;
}

.nav-links {
	display: flex;
	list-style: none;
	align-items: center;
}

.nav-links li {
	margin-left: 28px;
}

.nav-links a {
	text-decoration: none;
	color: var(--text-muted);
	font-weight: 500;
	font-size: 0.9rem;
	transition: 0.2s;
}

.nav-links a:hover {
	color: var(--primary);
}

.container {
	max-width: 1100px;
	margin: 0 auto;
}

/* Card Style */
.card {
	background: var(--white);
	padding: 25px;
	border-radius: 12px;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
	margin-bottom: 30px;
}

h2 {
	margin-top: 0;
	color: var(--primary);
	font-weight: 600;
}

/* Form Grid */
.purchase-form {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
	gap: 20px;
}

.form-group {
	display: flex;
	flex-direction: column;
}

label {
	font-size: 0.85rem;
	font-weight: 600;
	margin-bottom: 8px;
	color: #666;
}

input, select {
	padding: 10px;
	border: 1px solid var(--border);
	border-radius: 6px;
	font-size: 0.95rem;
	transition: border-color 0.3s ease;
}

input:focus {
	outline: none;
	border-color: var(--primary);
	box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
}

.btn-submit {
	grid-column: 1/-1;
	background: var(--primary);
	color: white;
	padding: 12px;
	border: none;
	border-radius: 6px;
	font-weight: 600;
	cursor: pointer;
	transition: background 0.3s;
}

.btn-submit:hover {
	background: var(--secondary);
}

/* Responsive Table */
.table-container {
	overflow-x: auto;
}

table {
	width: 100%;
	border-collapse: collapse;
	margin-top: 10px;
}

th {
	background: #f1f3f5;
	text-align: left;
	padding: 12px;
	font-size: 0.85rem;
	text-transform: uppercase;
	letter-spacing: 0.5px;
}

td {
	padding: 12px;
	border-bottom: 1px solid var(--border);
	font-size: 0.9rem;
}

tr:hover {
	background-color: #fcfcfc;
}

.badge {
	padding: 4px 8px;
	border-radius: 4px;
	font-size: 0.75rem;
	background: #e9ecef;
}

.btn-download {
	background-color: #27ae60;
	color: white;
	padding: 10px 15px;
	border-radius: 4px;
	font-weight: bold;
	text-decoration: none;
	transition: background 0.3s ease;
	margin-left: 977px;
}

.btn-download:hover {
	background-color: #219150;
}
</style>
</head>
<body>

	<header class="navbar">
		<div class="logo">CompanyLogo</div>
		<nav>
			<ul class="nav-links">
				<li><a th:href="@{/timesheets}">Timesheet</a></li>
				<li><a th:href="@{/profile}">My Profile</a></li>
				<li><a th:href="@{/employees}">Employee List</a></li>
				<li><a th:href="@{/labourRecords}">Labour Entries</a></li>
				<li><a th:href="@{/logout}" style="color: #dc2626;">Logout</a></li>
			</ul>
		</nav>
	</header>

	<div class="container">
		<!-- Purchase Entry Form -->
		<div class="card">
			<h2>New Material Purchase</h2>
			<form class="purchase-form" th:action="@{/purchases/save}"
				th:object="${purchase}" method="post">
				<div class="form-group">
					<label>Company Name</label> <input type="text"
						th:field="*{CompanyName}" placeholder="Enter company..." required>
				</div>
				<div class="form-group">
					<label>Site Name</label> <input type="text" th:field="*{SiteName}"
						placeholder="Enter site..." required>
				</div>
				<div class="form-group">
					<label>Material</label> <input type="text" th:field="*{Material}"
						placeholder="Steel, Cement, etc.">
				</div>
				
				<div class="form-group">
					<label>Quantity</label>
						<input type="number" th:field="*{Quantity}" placeholder="0.00"
							step="0.01" class="form-control">
				</div>
				<div class="form-group">
				<div style="display: flex; gap: 5px; margin-bottom: 10px;">
					 <select
							th:field="*{unit}" class="form-control">
							<option value="Nos">Nos</option>
							<option value="Mtr">Mtr</option>
							<option value="Bags">Bags</option>
							<option value="Kg">Kg</option>
						</select>
					</div>
		</div>
				<div class="form-group">
					<label>Bill No</label> <input type="text" th:field="*{BillNo}"
						placeholder="INV-1001">
				</div>
				<div class="form-group">
					<label>Price (Amt)</label> <input type="text" th:field="*{Amt}"
						placeholder="0.00">
				</div>
				<div class="form-group">
					<label>Purchase Date</label> <input type="date" th:field="*{date}"
						required>
				</div>
				<div class="form-group">
					<label>In Time</label> <input type="time" th:field="*{InTime}"
						required>
				</div>
				<button type="submit" class="btn-submit">Save Purchase
					Record</button>
			</form>
		</div>

		<!-- Recent Purchases Table -->
		<div class="card">
			<h2>Purchase History</h2>
			<a th:href="@{/purchases/export-excel}" class="btn-download">Excel</a>
			<div class="table-container">

				<table>
					<thead>
						<tr>
							<th>Date</th>
							<th>Company</th>
							<th>Site Name</th>
							<th>Material</th>
							<th>Qty</th>
							<th>Bill No</th>
							<th>Amount</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="item : ${purchases}">
							<td th:text="${item.Date}">2023-10-01</td>
							<td th:text="${item.companyName}">Company Name</td>
							<td th:text="${item.siteName}">Site Name</td>
							<td th:text="${item.material}">Steel</td>
							<td><span class="qty-badge" th:text="${item.quantity}">0</span>
							</td>
							<td th:text="${item.billNo}">INV-1001</td>
							<td th:text="${item.Amt}">0.00</td>
						</tr>

						<!-- Empty State: Shows if the 'purchases' list is empty -->
						<tr th:if="${#lists.isEmpty(purchases)}">
							<td colspan="8"
								style="text-align: center; color: var(--text-muted); padding: 40px;">
								No purchase records available yet.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</body>
</html>
